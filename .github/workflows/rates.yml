name: MarketWire rates

# Refreshes the Current Rates snapshot (data/rates.json) ONCE A DAY, after RBI's 1pm
# FX update. RBI's home page stamps its exchange rates "As at 1.00pm" (FBIL's daily
# USD/INR reference rate), so scraping in the early afternoon captures the SAME day's
# rates; a midnight run would only ever get the previous day's. Kept separate from the
# history poller so the rates scrape runs on its own daily cadence and the manual
# snapshot (the source of truth) is touched at most once a day.
#
# rates.poll_rates() (via `python rates.py`) writes the file ONLY on a complete, in-bounds
# parse, so a blocked / JS-rendered / changed-markup scrape leaves the committed snapshot
# untouched and preserves the MPC block (which isn't on the home page). The commit step
# then only commits when something actually changed.

on:
  schedule:
    # 13:30 IST = 08:00 UTC (IST = UTC+5:30). A ~30-min buffer past RBI's "1.00pm" FX
    # stamp so the same-day reference rate has actually posted. GitHub's scheduler is
    # best-effort and may delay or drop a run, so a second evening slot backs it up — every
    # write is guarded + commit-only-on-change, so the extra run is idempotent (it no-ops
    # when the file is already current). For exact timing, also point an external cron at this
    # workflow's workflow_dispatch (same setup as README → "Reliable 30-min cadence").
    - cron: "0 8 * * *"     # 13:30 IST
    - cron: "0 15 * * *"    # 20:30 IST — evening backup if the afternoon slot is dropped
  workflow_dispatch: {}       # manual runs (Actions tab) + optional external cron

permissions:
  contents: write             # needed to push the updated rates file

concurrency:
  group: marketwire-rates
  cancel-in-progress: false

jobs:
  rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4

      - name: Scrape RBI current rates
        run: python rates.py

      - name: Commit rates if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rates.json
          if git diff --cached --quiet; then
            echo "No rates change."
          else
            git commit -m "rates: update $(date -u +%FT%TZ)"
            # The 30-min history.yml also commits data/rates.json (FX/bonds overlays) — and
            # this cron fires at :00, the same minute as the external history dispatch — so a
            # bare push can lose the race. Rebase onto the remote and retry; -X theirs keeps
            # THIS run's fresh scrape on conflict ("theirs" = our replayed commit in a rebase).
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash -X theirs origin "${GITHUB_REF_NAME}" && git push && exit 0
              git rebase --abort 2>/dev/null || true
              echo "push attempt $i failed; retrying in $((i*3))s"; sleep $((i*3))
            done
            echo "::error::push failed after 5 attempts"
            exit 1
          fi
