name: MarketWire commodities

# Refreshes the commodity-price snapshot (data/commodities.json) ONCE A DAY from Yahoo
# Finance's keyless chart endpoint. We report each commodity's move vs its PREVIOUS CLOSE,
# so we only need settled daily closes — a single morning run captures the prior session's
# settlement. 07:00 UTC is after the US commodity-futures settlements of the day before, and
# is offset from the rates cron (08:00 UTC) so the two daily commits don't collide.
#
# commodities.poll_commodities() (via `python commodities.py`) writes the file ONLY when the
# liquid core (Brent/Gold/Silver/Copper) parses sanely; a blocked / rate-limited / changed
# Yahoo response leaves the committed snapshot untouched, and any single symbol that fails
# (or Zinc, which is the World Bank monthly value) keeps its last committed price. The commit
# step then only commits when something actually changed.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}       # manual runs (Actions tab) + optional external cron

permissions:
  contents: write             # needed to push the updated commodities file

concurrency:
  group: marketwire-commodities
  cancel-in-progress: false

jobs:
  commodities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Scrape commodity prices
        run: python commodities.py

      - name: Commit commodities if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/commodities.json
          if git diff --cached --quiet; then
            echo "No commodities change."
          else
            git commit -m "commodities: update $(date -u +%FT%TZ)"
            git push
          fi
